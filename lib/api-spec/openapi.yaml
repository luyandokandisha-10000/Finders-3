openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join waitlist
      description: Submit email to join the Finders app waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistEntry"
      responses:
        "201":
          description: Successfully joined waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResponse"
        "409":
          description: Email already on waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getWaitlistCount
      tags: [waitlist]
      summary: Get waitlist count
      description: Returns total number of people on the waitlist
      responses:
        "200":
          description: Waitlist count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistCount"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WaitlistEntry:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
      required:
        - email
    WaitlistResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        position:
          type: integer
      required:
        - success
        - message
        - position
    WaitlistCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
