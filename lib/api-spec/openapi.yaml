openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join waitlist
      description: Submit email to join the Finders app waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistEntry"
      responses:
        "201":
          description: Successfully joined waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResponse"
        "409":
          description: Email already on waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getWaitlistCount
      tags: [waitlist]
      summary: Get waitlist count
      description: Returns total number of people on the waitlist
      responses:
        "200":
          description: Waitlist count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistCount"
  /waitlist/entries:
    get:
      operationId: listWaitlistEntries
      tags: [waitlist]
      summary: List all waitlist entries
      description: Returns paginated list of waitlist entries with optional search
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by name or email
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Waitlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntriesList"
  /waitlist/export:
    get:
      operationId: exportWaitlist
      tags: [waitlist]
      summary: Export waitlist as CSV
      description: Returns all waitlist entries as a CSV file
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WaitlistEntry:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
      required:
        - email
    WaitlistResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        position:
          type: integer
      required:
        - success
        - message
        - position
    WaitlistCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count
    WaitlistEntryRecord:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt
    WaitlistEntriesList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/WaitlistEntryRecord"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - entries
        - total
        - page
        - limit
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
